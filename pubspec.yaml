name: remoteflow
description: "Modern SSH client optimized for AI-assisted remote development with scroll-aware streaming."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0-273.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  xterm: ^4.0.0
  dartssh2: ^2.11.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
